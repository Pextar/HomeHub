# ── USB CDC ACM (JSON output over USB) ────────────────────────────────────────
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="FT007TH RF Sensor Bridge"
CONFIG_USB_DEVICE_MANUFACTURER="homehub"
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# ── GPIO (RF RX data pin) ──────────────────────────────────────────────────────
CONFIG_GPIO=y

# ── Floating-point printf (needed for "%.1f" in snprintf) ─────────────────────
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── DWT cycle counter (sub-µs GPIO edge timing) ───────────────────────────────
CONFIG_CORTEX_M_DWT=y

# ── Logging ───────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y

# ── Stack / heap ──────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=1024
