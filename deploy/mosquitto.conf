# RF Socket Controller — local MQTT broker (Mosquitto).
# Installed to /etc/mosquitto/conf.d/rf-socket-controller.conf by
# scripts/setup-mosquitto.sh. Edit there + `sudo systemctl restart mosquitto`.

# Keep retained messages and queued QoS-1 traffic across broker restarts.
persistence true
persistence_location /var/lib/mosquitto/

# Listen on the standard MQTT port on all interfaces, so the controller
# (which connects to 127.0.0.1:1883) and your Wi-Fi devices / sensors on the
# LAN (Tasmota, Zigbee2MQTT, etc.) can all reach the broker.
listener 1883

# Authentication is appended by setup-mosquitto.sh based on its arguments:
#   - given MQTT_USERNAME + MQTT_PASSWORD it adds `allow_anonymous false`
#     plus a `password_file`, requiring a login (recommended).
#   - otherwise it adds `allow_anonymous true` — convenient, but then any
#     device on your LAN can publish/subscribe, so only do this on a
#     trusted home network.
