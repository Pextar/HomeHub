<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1020">
    <title>RF Socket Controller</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%2300d4ff' d='M28 4v22h-8l16 34V32h8z'/%3E%3C/svg%3E">
</head>
<body>
    <a class="skip-link" href="#main">Skip to main content</a>

    <div class="app">
        <aside class="sidebar" aria-label="Primary">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M11 2L4 14h6l-1 8 8-12h-6l1-8z"/></svg>
                </div>
                <div>
                    <div class="brand-name">RF Sockets</div>
                    <div class="brand-sub">Controller</div>
                </div>
            </div>

            <nav class="nav" aria-label="Sections">
                <a class="nav-item" href="#/dashboard" data-route="dashboard">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    Dashboard
                </a>
                <a class="nav-item" href="#/sockets" data-route="sockets">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M7 2h2v4H7zm8 0h2v4h-2zM5 8h14a2 2 0 012 2v4a8 8 0 01-7 7.94V22h-4v-.06A8 8 0 013 14v-4a2 2 0 012-2z"/></svg>
                    Sockets
                </a>
                <a class="nav-item" href="#/schedules" data-route="schedules">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 11h5v-2h-4V6h-2v7z"/></svg>
                    Schedules
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <span class="theme-toggle-icon" aria-hidden="true"></span>
                    <span class="theme-toggle-label">Theme</span>
                </button>
                <div class="health" id="health" aria-live="polite">
                    <span class="health-dot" data-state="unknown"></span>
                    <span class="health-label">Connecting…</span>
                </div>
            </div>
        </aside>

        <main class="main" id="main" tabindex="-1">
            <header class="topbar">
                <div class="topbar-title">
                    <h1 id="view-title">Dashboard</h1>
                    <p class="topbar-subtitle" id="view-subtitle">Overview of your RF sockets</p>
                </div>
                <div class="topbar-actions" id="topbar-actions"></div>
            </header>

            <section class="view" id="view-root" aria-live="polite"></section>
        </main>
    </div>

    <!-- Toast container -->
    <div class="toasts" id="toasts" aria-live="polite" aria-atomic="false"></div>

    <!-- Modal container -->
    <div class="modal-root" id="modal-root" hidden></div>

    <!-- Templates -->
    <template id="tpl-dashboard">
        <div class="dashboard">
            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-icon" data-tone="primary">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2L2 22h20L12 2z"/></svg>
                    </div>
                    <div>
                        <div class="stat-value" data-stat="total">0</div>
                        <div class="stat-label">Total sockets</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" data-tone="success">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M9 16.2L4.8 12l-1.4 1.4L9 19l12-12-1.4-1.4z"/></svg>
                    </div>
                    <div>
                        <div class="stat-value" data-stat="on">0</div>
                        <div class="stat-label">Currently on</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" data-tone="info">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 11h5v-2h-4V6h-2v7z"/></svg>
                    </div>
                    <div>
                        <div class="stat-value" data-stat="schedules">0</div>
                        <div class="stat-label">Active schedules</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" data-tone="warn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    </div>
                    <div>
                        <div class="stat-value" data-stat="rooms">0</div>
                        <div class="stat-label">Rooms</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Quick actions</h2>
                </div>
                <div class="quick-actions">
                    <button class="btn btn-secondary" data-action="all-on">Turn all on</button>
                    <button class="btn btn-secondary" data-action="all-off">Turn all off</button>
                    <button class="btn btn-ghost" data-action="refresh">Refresh</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Rooms</h2>
                </div>
                <div class="room-grid" data-rooms></div>
            </div>
        </div>
    </template>

    <template id="tpl-sockets">
        <div class="sockets-view">
            <div class="toolbar">
                <div class="search">
                    <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M10 2a8 8 0 105.3 14L21 21.7 22.7 20 17 14.3A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/></svg>
                    <input type="search" placeholder="Search sockets…" data-search aria-label="Search sockets">
                </div>
                <div class="toolbar-right">
                    <select data-room-filter aria-label="Filter by room">
                        <option value="">All rooms</option>
                    </select>
                </div>
            </div>
            <div data-grouped></div>
        </div>
    </template>

    <template id="tpl-schedules">
        <div class="schedules-view">
            <div data-list></div>
        </div>
    </template>

    <template id="tpl-empty-sockets">
        <div class="empty-state">
            <svg viewBox="0 0 24 24" width="48" height="48" aria-hidden="true"><path fill="currentColor" d="M7 2h2v4H7zm8 0h2v4h-2zM5 8h14a2 2 0 012 2v4a8 8 0 01-7 7.94V22h-4v-.06A8 8 0 013 14v-4a2 2 0 012-2z"/></svg>
            <h3>No sockets yet</h3>
            <p>Add your first 433MHz socket to get started.</p>
            <button class="btn btn-primary" data-action="add-socket">Add socket</button>
        </div>
    </template>

    <template id="tpl-empty-schedules">
        <div class="empty-state">
            <svg viewBox="0 0 24 24" width="48" height="48" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 11h5v-2h-4V6h-2v7z"/></svg>
            <h3>No schedules yet</h3>
            <p>Schedule your sockets to turn on or off automatically.</p>
            <button class="btn btn-primary" data-action="add-schedule">Add schedule</button>
        </div>
    </template>

    <template id="tpl-empty-search">
        <div class="empty-state empty-state-compact">
            <h3>No matches</h3>
            <p>Try a different search or clear the filters.</p>
        </div>
    </template>

    <script src="app.js" defer></script>
</body>
</html>
